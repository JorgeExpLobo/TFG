version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=jorexpos
      - N8N_BASIC_AUTH_PASSWORD=123
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

volumes:
  n8n_data: